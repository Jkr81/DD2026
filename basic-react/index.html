<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Link to the react libary from unpkg.com -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Link to the babel library from unpkg.com -->

</head>
<body>
    <!-- Important React concepts: Components, Props, State -->
    <div id="app">
        <script type="text/jsx"> 
            const app = document.getElementById('app');
            // React Components
            function Header(props) {
                const {title} = props;
                return <h1 className={props.class}>{title}</h1>;
            }   
            function createTittle(title) {
                if(title) {
                    return  "Default title";
                }
                return {title}
            }
            function Homepage() {
                return (
                <>
                    <Header title="Welcome to the homepage" />
                    <Header title="Another Header" />
                    <p>This is the homepage</p>
                </>
                );
            }   



            const root = ReactDOM.createRoot(app);
            root.render(<Homepage />);
        </script>
    </div>
</body>
</html>
