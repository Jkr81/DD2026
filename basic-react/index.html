<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="app" class="container"></div>

    <script type="text/babel">
      const app = document.getElementById("app");

      function Header({ title }) {
        return <h1>{title || "Default title"}</h1>;
      }

      function Paragraph({ text }) {
        return <p>{text}</p>;
      }

      function formatHtml(text) {
        return <span dangerouslySetInnerHTML={{ __html: text }} />;
      }

      function Results({
        result,
        totalResults,
        currentPage,
        lastPage,
        getNextPage,
        getPreviousPage,
      }) {
        return (
          <div className="mt-4">
            {result.length > 0 && <h2>Search Results:</h2>}

            {result.length > 0 && (
              <>
                <Paragraph text={`Showing page ${currentPage} of ${lastPage}`} />
                <Paragraph text={`Total Results: ${totalResults}`} />
              </>
            )}

            <table className="table table-striped">
              <tbody>
                {result.map((res) => (
                  <tr key={res.uid}>
                    <td>
                      <strong>{res.alpha}</strong> <br />
                      {formatHtml(res.context)} <br />
                      <a href={res.url} target="_blank">
                        View
                      </a>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            {result.length > 0 && (
              <div className="d-flex gap-2">
                <button
                  className="btn btn-secondary"
                  onClick={getPreviousPage}
                  disabled={currentPage === 1}
                >
                  Previous Page
                </button>

                <button
                  className="btn btn-secondary"
                  onClick={getNextPage}
                  disabled={currentPage === lastPage}
                >
                  Next Page
                </button>
              </div>
            )}
          </div>
        );
      }

      function Homepage() {
        const [searchTerm, setSearchTerm] = React.useState("");
        const [searchResults, setSearchResults] = React.useState([]);

        // pagination state
        const [totalResults, setTotalResults] = React.useState(0);
        const [currentPage, setCurrentPage] = React.useState(1);
        const [lastPage, setLastPage] = React.useState(1);

        function performSearch(page = 1) {
          const url = `https://www.cdn.miami.edu/_assets-common/php/searchblox/?q=${searchTerm}&page=${page}`;

          fetch(url)
            .then((res) => res.json())
            .then((data) => {
              setSearchResults(data.result || []);
              setTotalResults(data.hits || 0);
              setCurrentPage(data.currentPage || 1);
              setLastPage(data.lastPage || 1);
            })
            .catch((err) => console.error(err));
        }

        function handleSearch() {
          setCurrentPage(1);
          performSearch(1);
        }

        function getNextPage() {
          if (currentPage < lastPage) {
            performSearch(currentPage + 1);
          }
        }

        function getPreviousPage() {
          if (currentPage > 1) {
            performSearch(currentPage - 1);
          }
        }

        return (
          <>
            <Header title="Welcome to the search page" />
            <Paragraph text="Enter a search term below." />

            <div className="mb-3">
              <input
                className="form-control"
                placeholder="Search miami.edu..."
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
              />
            </div>

            <button className="btn btn-primary" onClick={handleSearch}>
              Search
            </button>

            <Results
              result={searchResults}
              totalResults={totalResults}
              currentPage={currentPage}
              lastPage={lastPage}
              getNextPage={getNextPage}
              getPreviousPage={getPreviousPage}
            />
          </>
        );
      }

      ReactDOM.createRoot(app).render(<Homepage />);
    </script>
  </body>
</html>
